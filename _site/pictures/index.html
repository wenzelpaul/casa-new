<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pictures</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Photo gallery">
  <link rel="stylesheet" href="/assets/css/gallery.css">
  <style>
    :root { --fg:#1a1a1a; --bg:#ffffff; --muted:#666; --link:#0a66c2; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial; color: var(--fg); background: var(--bg); line-height: 1.55; }
    header, main, footer { max-width: 960px; margin: 0 auto; padding: 1rem; }
    header { padding-top: 1.5rem; padding-bottom: 0.5rem; }
    nav a { margin-right: 1rem; color: var(--link); text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    h1, h2, h3 { line-height: 1.2; }
    footer { color: var(--muted); font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Casa Orizzonte Blu</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/pictures/">Pictures</a>
      <a href="/contact/">Contact</a>
    </nav>
  </header>
  <main>
    
<h2>Pictures</h2>

<div class="gallery" data-gallery>
  
    <a href="/assets/images/pictures/bild1.jpg" class="thumb" data-index="0" data-caption="Sea view from the terrace">
      <img src="/assets/images/pictures/bild1.jpg" alt="Sea view from the terrace">
    </a>
  
    <a href="/assets/images/pictures/bild2.jpg" class="thumb" data-index="1" data-caption="Living room with daylight">
      <img src="/assets/images/pictures/bild2.jpg" alt="Living room with daylight">
    </a>
  
    <a href="/assets/images/pictures/bild3.jpg" class="thumb" data-index="2" data-caption="Bedroom with balcony">
      <img src="/assets/images/pictures/bild3.jpg" alt="Bedroom with balcony">
    </a>
  
    <a href="/assets/images/pictures/blick.jpg" class="thumb" data-index="3" data-caption="Kitchen and dining area">
      <img src="/assets/images/pictures/blick.jpg" alt="Kitchen and dining area">
    </a>
  
</div>

  </main>

  <!-- Lightbox overlay (hidden by default) -->
  <div id="lightbox" aria-hidden="true">
    <button class="lb-close" aria-label="Close">&times;</button>
    <button class="lb-prev" aria-label="Previous">&#10094;</button>
    <figure class="lb-figure">
      <img class="lb-image" alt="">
      <figcaption class="lb-caption"></figcaption>
    </figure>
    <button class="lb-next" aria-label="Next">&#10095;</button>
  </div>

  <script defer src="/assets/js/gallery.js"></script>
</body>
</html>
